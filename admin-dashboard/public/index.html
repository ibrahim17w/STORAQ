<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STORAQ Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface-hover: #1a2235;
      --border: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #06b6d4;
      --primary-hover: #0891b2;
      --primary-glow: rgba(6, 182, 212, 0.35);
      --accent: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --sidebar-width: 240px;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    #app { display: none; min-height: 100vh; }
    #app.visible { display: flex; }

    .sidebar { width: var(--sidebar-width); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-header { padding: 24px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 18px; font-weight: 700; color: var(--primary); }
    .sidebar-nav { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius); color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.15s; }
    .nav-item:hover { background: var(--surface-hover); color: var(--text); }
    .nav-item.active { background: var(--primary); color: #fff; }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }

    .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 32px; min-height: 100vh; }

    .login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-overlay.hidden { display: none; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; }
    .login-card h2 { margin-bottom: 24px; font-size: 22px; text-align: center; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 500; color: var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
    .error-msg { color: var(--danger); font-size: 13px; min-height: 20px; margin-bottom: 8px; }

    .btn { padding: 9px 16px; border-radius: var(--radius); border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { opacity: 0.9; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-warning { background: var(--warning); color: #000; }
    .btn-warning:hover { opacity: 0.9; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
    .btn-full { width: 100%; justify-content: center; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }

    .page-header { margin-bottom: 24px; }
    .page-header h2 { font-size: 22px; font-weight: 600; }
    .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .stat-card .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .stat-card .stat-label { font-size: 13px; color: var(--text-muted); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-meta { font-size: 12px; color: var(--text-muted); }
    .card-body { font-size: 14px; color: var(--text-muted); }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { font-weight: 600; color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

    .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.15); color: var(--success); }
    .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
    .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
    .badge-neutral { background: rgba(139,141,151,0.15); color: var(--text-muted); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .hidden { display: none !important; }
    .mt-2 { margin-top: 8px; }
    .mb-4 { margin-bottom: 16px; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }

    .product-img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: var(--bg); }
    .inline-form { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
    .inline-form .form-group { margin-bottom: 0; }

    .support-layout { display: grid; grid-template-columns: 320px 1fr; gap: 16px; min-height: 520px; }
    .support-list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: auto; max-height: 70vh; }
    .support-item { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .support-item:hover, .support-item.active { background: var(--surface-hover); }
    .support-item .title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .support-item .meta { font-size: 12px; color: var(--text-muted); }
    .badge-cat-billing { background: rgba(59, 130, 246, 0.18); color: #93c5fd; }
    .badge-cat-account { background: rgba(168, 85, 247, 0.18); color: #d8b4fe; }
    .badge-cat-technical { background: rgba(245, 158, 11, 0.18); color: #fcd34d; }
    .badge-cat-report { background: rgba(239, 68, 68, 0.18); color: #fca5a5; }
    .badge-cat-review_removal { background: rgba(236, 72, 153, 0.18); color: #f9a8d4; }
    .badge-cat-general { background: rgba(100, 116, 139, 0.18); color: #cbd5e1; }
    .support-payment-banner {
      margin: 12px 16px 0;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(16, 185, 129, 0.35);
      background: rgba(16, 185, 129, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .support-payment-banner p { margin: 0; font-size: 13px; color: var(--text); }
    .support-thread img.support-attach {
      max-width: 240px;
      max-height: 200px;
      border-radius: 8px;
      margin-top: 6px;
      display: block;
      cursor: zoom-in;
      border: 1px solid var(--border);
    }
    .support-thread { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; min-height: 520px; }
    .support-thread-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .support-messages { flex: 1; overflow: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .support-bubble { max-width: 78%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.45; }
    .support-bubble.user { align-self: flex-start; background: var(--bg); border: 1px solid var(--border); }
    .support-bubble.admin { align-self: flex-end; background: rgba(99,102,241,0.18); border: 1px solid rgba(99,102,241,0.35); }
    .support-bubble .who { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .support-compose { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
    .support-compose textarea { flex: 1; min-height: 72px; resize: vertical; }

    /* ─── Analytics — flat fintech dashboard ─── */
    .analytics-shell { display: flex; flex-direction: column; gap: 24px; }
    .analytics-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
    .analytics-header h2 { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
    .analytics-header p { color: var(--text-muted); font-size: 13px; margin-top: 4px; line-height: 1.5; }
    .analytics-refresh { font-size: 12px; color: var(--text-muted); }
    .analytics-toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .kpi-card {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-height: 88px;
      cursor: help;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .kpi-card:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }
    .kpi-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: rgba(6, 182, 212, 0.12);
      border: 1px solid rgba(6, 182, 212, 0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .kpi-body { flex: 1; min-width: 0; }
    .kpi-card .kpi-value { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 2px; letter-spacing: -0.02em; }
    .kpi-card .kpi-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .kpi-card .kpi-sub { font-size: 11px; color: var(--primary); margin-top: 6px; line-height: 1.4; }

    .analytics-nav {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 4px;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .analytics-tab {
      padding: 10px 16px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .analytics-tab:hover { background: var(--surface-hover); color: var(--text); }
    .analytics-tab.active {
      background: rgba(6, 182, 212, 0.12);
      border-color: rgba(6, 182, 212, 0.35);
      color: var(--primary);
    }

    .analytics-panel-wrap { min-height: 320px; }
    .analytics-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .analytics-split.single { grid-template-columns: 1fr; }

    .panel {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 0;
    }
    .panel-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; gap: 8px; }
    .panel-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .panel-sub { font-size: 11px; color: var(--text-muted); font-weight: 400; }

    .chart-wrap { position: relative; height: 240px; }
    .chart-wrap-lg { position: relative; height: 280px; }
    .chart-wrap-sm { position: relative; height: 200px; }

    .donut-layout { display: grid; grid-template-columns: 1fr 160px; gap: 16px; align-items: center; }
    .chart-legend-external { display: flex; flex-direction: column; gap: 12px; }
    .legend-item { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-item strong { display: block; color: var(--text); font-size: 13px; font-weight: 600; }

    #store-map { height: 400px; border-radius: 8px; z-index: 1; background: #121212; border: 1px solid var(--border); }
    .leaflet-container { background: #121212 !important; font-family: Inter, sans-serif; }
    .map-legend { display: flex; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
    .map-legend i { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .legend-active { background: var(--primary); }
    .legend-inactive { background: #64748b; }

    .txn-list { display: flex; flex-direction: column; gap: 0; max-height: 300px; overflow-y: auto; }
    .txn-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 12px; }
    .txn-item:last-child { border-bottom: none; }
    .txn-store { font-weight: 600; color: var(--text); font-size: 13px; }
    .txn-meta { color: var(--text-muted); font-size: 11px; margin-top: 4px; }
    .txn-amount { font-weight: 600; color: var(--primary); white-space: nowrap; font-size: 13px; }

    .analytics-actions { display: flex; flex-direction: column; gap: 8px; }
    .analytics-actions .btn { justify-content: center; width: 100%; }

    .store-pin-popup { font-size: 12px; line-height: 1.5; }
    .store-pin-popup strong { color: var(--primary); }

    @media (max-width: 1200px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .analytics-split { grid-template-columns: 1fr; }
      .donut-layout { grid-template-columns: 1fr; }
      #store-map { height: 320px; }
    }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar .nav-item span:not(.nav-icon) { display: none; }
      .sidebar-header h1 { font-size: 14px; }
      .main-content { margin-left: 60px; padding: 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .kpi-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-header"><h1>STORAQ</h1></div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="analytics"><span class="nav-icon">&#128202;</span> Analytics</a>
        <a href="#" class="nav-item" data-page="dashboard"><span class="nav-icon">&#9632;</span> Dashboard</a>
        <a href="#" class="nav-item" data-page="users"><span class="nav-icon">&#128101;</span> Users</a>
        <a href="#" class="nav-item" data-page="reviews"><span class="nav-icon">&#11088;</span> Reviews</a>
        <a href="#" class="nav-item" data-page="stores"><span class="nav-icon">&#127978;</span> Stores</a>
        <a href="#" class="nav-item" data-page="products"><span class="nav-icon">&#9998;</span> Product Approvals</a>
        <a href="#" class="nav-item" data-page="payments"><span class="nav-icon">&#36;</span> Payments</a>
        <a href="#" class="nav-item" data-page="sponsored"><span class="nav-icon">&#9733;</span> Sponsored Products</a>
        <a href="#" class="nav-item" data-page="promos"><span class="nav-icon">&#127991;</span> Promo Codes</a>
        <a href="#" class="nav-item" data-page="flagged"><span class="nav-icon">&#9888;</span> Flagged Stores</a>
        <a href="#" class="nav-item" data-page="support"><span class="nav-icon">&#128172;</span> Support Tickets</a>
        <a href="#" class="nav-item" data-page="reports"><span class="nav-icon">&#128681;</span> Reports</a>
      </nav>
      <div class="sidebar-footer"><button id="logout-btn" class="btn btn-ghost">Logout</button></div>
    </aside>
    <main class="main-content" id="main-content"></main>
  </div>

  <div id="login-overlay" class="login-overlay">
    <div class="login-card">
      <h2>Admin Login</h2>
      <form id="login-form">
        <div class="form-group"><label for="email">Email</label><input type="email" id="email" required autocomplete="email"></div>
        <div class="form-group"><label for="password">Password</label><input type="password" id="password" required autocomplete="current-password"></div>
        <p class="error-msg" id="login-error"></p>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
    </div>
  </div>

<script>
// ─── API Helper ─────────────────────────────────────────────────────────────
const API_BASE = window.location.origin; // e.g. http://localhost:4400
// Fallback to common dev backend port so support images load even before
// /api/config has been fetched. loadMediaConfig() will overwrite this.
let MEDIA_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://' + window.location.hostname + ':3000'
  : '';
let paymentHighlightId = null;
let paymentHighlightType = null;

const SUPPORT_CATEGORIES = {
  general: 'General',
  account: 'Account',
  billing: 'Billing / Payments',
  technical: 'Technical',
  report: 'Report',
  review_removal: 'Review Removal',
};

const API = {
  async request(method, url, body) {
    // If page was opened as file://, API calls won't work
    if (window.location.protocol === 'file:') {
      throw new Error('Open http://localhost:4400 in your browser (not the file directly)');
    }
    const fullUrl = API_BASE + url;
    const opts = { method, headers: {}, credentials: 'same-origin' };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    let res;
    try {
      res = await fetch(fullUrl, opts);
    } catch (err) {
      console.error('Fetch failed:', err);
      throw new Error('Cannot reach server at ' + fullUrl + ' — ' + (err.message || 'connection failed'));
    }
    let data;
    const text = await res.text();
    try { data = JSON.parse(text); } catch { throw new Error('Non-JSON response (' + res.status + '): ' + text.substring(0, 100)); }
    if (res.status === 401) { showLogin(); throw new Error(data.error || 'Not authenticated'); }
    if (!res.ok) throw new Error(data.error || 'Error ' + res.status);
    return data;
  },
  get(u) { return this.request('GET', u); },
  post(u, b) { return this.request('POST', u, b); },
  patch(u, b) { return this.request('PATCH', u, b); },
  del(u) { return this.request('DELETE', u); },
};

// ─── Auth ────────────────────────────────────────────────────────────────────
function showLogin() { document.getElementById('login-overlay').classList.remove('hidden'); document.getElementById('app').classList.remove('visible'); }
function hideLogin() { document.getElementById('login-overlay').classList.add('hidden'); document.getElementById('app').classList.add('visible'); }

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('login-error');
  const btn = e.target.querySelector('button[type="submit"]');
  err.textContent = '';
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; }
  try {
    await API.post('/api/auth/login', {
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value
    });
    hideLogin();
    await loadMediaConfig();
    navigateTo('analytics');
  } catch (ex) {
    err.textContent = ex.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
  }
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  try { await API.post('/api/auth/logout'); } catch {}
  showLogin();
});

// ─── Navigation ──────────────────────────────────────────────────────────────
let currentPage = 'dashboard';
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', (e) => { e.preventDefault(); navigateTo(item.dataset.page); });
});

function navigateTo(page) {
  if (currentPage === 'analytics' && page !== 'analytics') {
    if (analyticsPollTimer) { clearInterval(analyticsPollTimer); analyticsPollTimer = null; }
    destroyAnalyticsAll();
  }
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.page === page));
  renderPage(page);
}

function renderPage(page) {
  const c = document.getElementById('main-content');
  switch(page) {
    case 'analytics': renderAnalytics(c); break;
    case 'dashboard': renderDashboard(c); break;
    case 'users': renderUsers(c); break;
    case 'reviews': renderReviews(c); break;
    case 'stores': renderStores(c); break;
    case 'products': renderProducts(c); break;
    case 'payments': renderPayments(c); break;
    case 'sponsored': renderSponsored(c); break;
    case 'promos': renderPromos(c); break;
    case 'flagged': renderFlagged(c); break;
    case 'support': renderSupport(c); break;
    case 'reports': renderReports(c); break;
  }
}

let activeSupportTicketId = null;
let supportPollTimer = null;
let analyticsCharts = [];
let analyticsMap = null;
let analyticsPollTimer = null;
let analyticsActiveTab = 'overview';
let analyticsDataCache = null;

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
async function loadMediaConfig() {
  try {
    const cfg = await API.get('/api/config');
    if (cfg && cfg.mediaBaseUrl) MEDIA_BASE = String(cfg.mediaBaseUrl).replace(/\/$/, '');
  } catch (_) {}
}

function fmtNum(n) {
  const v = Number(n) || 0;
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e4) return (v / 1e3).toFixed(1) + 'K';
  return v.toLocaleString(undefined, { maximumFractionDigits: 0 });
}
function fmtMoney(n, cur) {
  const v = Number(n) || 0;
  const c = cur || 'SYP';
  if (v >= 1e6) return c + ' ' + (v / 1e6).toFixed(2) + 'M';
  if (v >= 1e4) return c + ' ' + (v / 1e3).toFixed(1) + 'K';
  return c + ' ' + v.toLocaleString(undefined, { maximumFractionDigits: 0 });
}
function fillDateSeries(rows, valueKey, days) {
  const map = new Map();
  (rows || []).forEach((r) => {
    const d = r.date instanceof Date ? r.date.toISOString().slice(0, 10) : String(r.date).slice(0, 10);
    map.set(d, Number(r[valueKey]) || 0);
  });
  const labels = [];
  const data = [];
  const now = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const dt = new Date(now);
    dt.setDate(dt.getDate() - i);
    const key = dt.toISOString().slice(0, 10);
    labels.push(dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
    data.push(map.get(key) || 0);
  }
  return { labels, data };
}

function chartDefaults(extra) {

}
function supportImageUrl(url) {
  if (!url) return '';
  if (url.startsWith('http://') || url.startsWith('https://')) return url;
  const path = url.startsWith('/') ? url : '/' + url;
  // Default to the backend (where multer wrote the file); the admin's
  // own /uploads is used as a fallback via the <img> onerror handler.
  if (MEDIA_BASE) return MEDIA_BASE + path;
  return API_BASE + path;
}
function uploadsPathFromUrl(url) {
  if (!url) return '';
  if (url.startsWith('http://') || url.startsWith('https://')) {
    try {
      const u = new URL(url);
      if (u.pathname.startsWith('/uploads/')) return u.pathname;
    } catch (_) {}
    return '';
  }
  return url.startsWith('/') ? url : '/' + url;
}
function productImageFromRow(p) {
  if (p.image_url) return p.image_url;
  if (p.images) {
    try {
      const imgs = typeof p.images === 'string' ? JSON.parse(p.images) : p.images;
      if (Array.isArray(imgs) && imgs.length) return imgs[0];
    } catch (_) {}
  }
  return null;
}
function productImageHtml(url) {
  if (!url) return '<span style="color:var(--text-muted)">—</span>';
  const path = uploadsPathFromUrl(url);
  if (!path.startsWith('/uploads/')) {
    const primarySrc = supportImageUrl(url);
    return '<img src="' + primarySrc + '" class="product-img" alt="" loading="lazy">';
  }
  const primarySrc = API_BASE + path;
  const fallbackSrc = (MEDIA_BASE || API_BASE) + path;
  const onerror =
    'if(this.dataset.tried!==\'1\'&&this.src!==' + JSON.stringify(fallbackSrc) + '){this.dataset.tried=\'1\';this.src=' + JSON.stringify(fallbackSrc) + ';}' +
    'else{this.style.display=\'none\';if(!this.parentElement.querySelector(\'.img-missing\')){this.parentElement.insertAdjacentHTML(\'beforeend\',\'<span class="img-missing" style="color:var(--text-muted)">—</span>\');}}';
  return '<img src="' + primarySrc + '" class="product-img" alt="" loading="lazy" onerror="' + onerror.replace(/"/g, '&quot;') + '">';
}
function supportCategoryLabel(cat) {

function supportCategoryBadge(cat) {

function renderSupportMessageBody(m) {

    return '<a href="' + primarySrc + '" target="_blank" rel="noopener"><img class="support-attach" src="' + primarySrc + '" alt="Support image attachment" loading="lazy" onerror="' + onerror.replace(/"/g, '&quot;') + '"></a>' + cap;
  }
  if (type === 'image_request') {

  }
  return esc(m.body || '');
}
function makeLineChart(canvasId, labels, data, color, opts) {
  const el = document.getElementById(canvasId);
  if (!el || typeof Chart === 'undefined') return;
  const fill = opts && opts.fill;
  const chart = new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: color,
        backgroundColor: fill ? color.replace('rgb', 'rgba').replace(')', ', 0.08)') : 'transparent',
        fill: !!fill,
        tension: 0.3,
        pointRadius: 0,
        pointHoverRadius: 4,
        borderWidth: 2,
      }],
    },
    options: chartDefaults({
      plugins: {
        tooltip: {
          callbacks: {
            label: (ctx) => ' ' + (opts && opts.tooltipLabel ? opts.tooltipLabel(ctx.parsed.y) : fmtMoney(ctx.parsed.y, 'USD')),
          },
        },
      },
    }),
  });
  analyticsCharts.push(chart);
}
function makeBarChart(canvasId, labels, data, color, tooltipLabel) {
  const el = document.getElementById(canvasId);
  if (!el || typeof Chart === 'undefined') return;
  const chart = new Chart(el, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data, backgroundColor: color, borderRadius: 6, maxBarThickness: 24 }],
    },
    options: chartDefaults({
      plugins: {
        tooltip: {
          callbacks: {
            label: (ctx) => ' ' + (tooltipLabel ? tooltipLabel(ctx.parsed.y) : fmtMoney(ctx.parsed.y, 'USD')),
          },
        },
      },
    }),
  });
  analyticsCharts.push(chart);
}
function makeDoughnutChart(canvasId, labels, data, legendId) {
  const el = document.getElementById(canvasId);
  if (!el || typeof Chart === 'undefined') return;
  const palette = ['#06b6d4', '#f59e0b', '#3b82f6', '#10b981'];
  const chart = new Chart(el, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: labels.map((_, i) => palette[i % palette.length]),
        borderWidth: 0,
        spacing: 2,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '68%',
      interaction: { mode: 'nearest', intersect: true },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15, 23, 42, 0.92)',
          callbacks: {
            label: (ctx) => {
              const total = data.reduce((a, b) => a + b, 0) || 1;
              const pct = Math.round((ctx.parsed / total) * 100);
              return ' ' + ctx.label + ': ' + fmtMoney(ctx.parsed, 'USD') + ' (' + pct + '%)';
            },
          },
        },
      },
    },
  });
  analyticsCharts.push(chart);
  if (legendId) {
    const leg = document.getElementById(legendId);
    if (leg) {
      const total = data.reduce((a, b) => a + b, 0) || 1;
      leg.innerHTML = labels.map((label, i) => {
        const pct = Math.round((data[i] / total) * 100);
        return '<div class="legend-item">' +
          '<span class="legend-dot" style="background:' + palette[i % palette.length] + '"></span>' +
          '<div><strong>' + esc(label) + '</strong>' + fmtMoney(data[i], 'USD') + ' · ' + pct + '%</div></div>';
      }).join('');
    }
  }
}
function mergePaymentSeries(subRows, sponsorRows, days) {
  const sub = fillDateSeries(subRows, 'revenue', days);
  const spo = fillDateSeries(sponsorRows, 'revenue', days);
  const combined = sub.data.map((v, i) => v + (spo.data[i] || 0));
  return { labels: sub.labels, data: combined };
}
function initStoreMap(stores) {
  const mapEl = document.getElementById('store-map');
  if (!mapEl || typeof L === 'undefined') return;
  if (analyticsMap) { analyticsMap.remove(); analyticsMap = null; }
  analyticsMap = L.map('store-map', { zoomControl: true, attributionControl: true }).setView([33.5, 36.3], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(analyticsMap);
  const bounds = [];
  (stores || []).forEach((s) => {
    const lat = parseFloat(s.lat);
    const lng = parseFloat(s.lng);
    if (Number.isNaN(lat) || Number.isNaN(lng)) return;
    const active = s.is_active !== false;
    const marker = L.circleMarker([lat, lng], {
      radius: active ? 8 : 5,
      fillColor: active ? '#06b6d4' : '#64748b',
      color: active ? '#22d3ee' : '#94a3b8',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.85,
    });
    marker.bindPopup(
      '<div class="store-pin-popup">' +
      '<strong>' + esc(s.name) + '</strong><br>' +
      esc(s.city || '') + (s.country ? ', ' + esc(s.country) : '') + '<br>' +
      'Products: ' + (s.product_count || 0) + ' · Online: ' + (s.online_product_count || 0) + '<br>' +
      (active ? 'Active store' : 'Deactivated') +
      '</div>'
    );
    marker.addTo(analyticsMap);
    bounds.push([lat, lng]);
  });
  if (bounds.length === 1) analyticsMap.setView(bounds[0], 10);
  else if (bounds.length > 1) analyticsMap.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
  setTimeout(() => { try { analyticsMap.invalidateSize(); } catch (_) {} }, 200);
}
function renderProgressList(containerId, items, valueKey, labelKey) {
  const el = document.getElementById(containerId);

      '</div>';
  }).join('');
}

async function loadAnalyticsData(silent) {
  const updatedEl = document.getElementById('analytics-updated');
  if (!silent && updatedEl) updatedEl.textContent = 'Updating...';
  try {
    const d = await API.get('/api/analytics/overview');
    analyticsDataCache = d;
    renderAnalyticsKpis(d.summary);
    if (!silent) {
      renderAnalyticsTabPanel(d);
    } else if (analyticsActiveTab === 'stores') {
      const pinEl = document.getElementById('map-pin-count');
      const s = d.summary;
      if (pinEl) {
        pinEl.textContent = s.stores_on_map + ' pinned' +
          (s.stores_without_location > 0 ? ' · ' + s.stores_without_location + ' without GPS' : '');
      }
    }
    if (updatedEl) updatedEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    if (!silent) {
      const kpi = document.getElementById('analytics-kpi');
      if (kpi) kpi.innerHTML = '<p class="error-msg">' + esc(e.message) + '</p>';
      const wrap = document.getElementById('analytics-tab-content');
      if (wrap) wrap.innerHTML = '<p class="error-msg">' + esc(e.message) + '</p>';
    }
    if (updatedEl) updatedEl.textContent = 'Update failed';
  }
}

async function loadStores() {
  const el = document.getElementById('stores-list');
  const search = document.getElementById('store-search')?.value || '';
  const status = document.getElementById('store-status')?.value || 'all';
  let url = '/api/stores?';
  if (search) url += 'search=' + encodeURIComponent(search) + '&';
  if (status !== 'all') url += 'status=' + status;
  try {
    const items = await API.get(url);
    if (items.length === 0) { el.innerHTML = '<div class="empty-state"><p>No stores found</p></div>'; return; }
    el.innerHTML = `<table><thead><tr><th>Store</th><th>Owner</th><th>City</th><th>Products</th><th>Created</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${items.map(s => {
        const isActive = s.is_active !== false;
        return `<tr id="st-${s.id}">
          <td><strong>${esc(s.name)}</strong></td>
          <td>${esc(s.owner_name)}<br><span style="font-size:11px;color:var(--text-muted)">${esc(s.owner_email)}</span></td>
          <td>${esc(s.city||'')} ${esc(s.country||'')}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="toggleProducts(${s.id})">${s.product_count} &#9662;</button></td>
          <td>${new Date(s.created_at).toLocaleDateString()}</td>
          <td><span class="badge ${isActive?'badge-success':'badge-danger'}">${isActive?'Active':'Deactivated'}</span>
            ${!isActive && s.deactivation_reason ? '<br><span style="font-size:11px;color:var(--text-muted)">'+esc(s.deactivation_reason)+'</span>' : ''}
          </td>
          <td>${isActive
            ? '<button class="btn btn-danger btn-sm" onclick="showDeactivate('+s.id+')">Deactivate</button>'
            : '<button class="btn btn-success btn-sm" onclick="reactivateStore('+s.id+')">Reactivate</button>'
          }</td>
        </tr>
        <tr id="products-row-${s.id}" class="hidden"><td colspan="7" style="background:var(--bg);padding:12px">
          <div id="products-list-${s.id}"><em style="color:var(--text-muted)">Loading products...</em></div>
        </td></tr>
        <tr id="deact-row-${s.id}" class="hidden"><td colspan="7" style="background:var(--bg);padding:12px">
          <div class="inline-form">
            <div class="form-group"><label>Reason for deactivation (required)</label><input type="text" id="deact-reason-${s.id}" placeholder="e.g. Terms of use violation — selling counterfeit goods" style="width:400px"></div>
            <button class="btn btn-danger btn-sm" onclick="confirmDeactivate(${s.id})">Confirm Deactivate</button>
            <button class="btn btn-ghost btn-sm" onclick="hideDeactivate(${s.id})">Cancel</button>
          </div>
        </td></tr>`;
      }).join('')}
    </tbody></table>`;
  } catch (e) { el.innerHTML = '<p class="error-msg">'+e.message+'</p>'; }
}

async function toggleProducts(storeId) {
  const row = document.getElementById('products-row-'+storeId);
  if (!row.classList.contains('hidden')) { row.classList.add('hidden'); return; }
  row.classList.remove('hidden');
  await loadStoreProducts(storeId);
}

async function loadStoreProducts(storeId) {
  const el = document.getElementById('products-list-'+storeId);
  try {
    const items = await API.get('/api/stores/'+storeId+'/products');
    if (items.length === 0) { el.innerHTML = '<p style="color:var(--text-muted)">No products in this store</p>'; return; }
    el.innerHTML = `<table style="margin:0"><thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Qty</th><th>Online</th><th>Created</th><th>Action</th></tr></thead><tbody>
      ${items.map(p => `<tr id="sp-${storeId}-${p.id}">
        <td>${productImageHtml(productImageFromRow(p))}</td>
        <td>${esc(p.name)}</td>
        <td>${p.price} ${p.currency||'SYP'}</td>
        <td>${p.quantity}</td>
        <td><span class="badge ${p.is_online?'badge-success':'badge-neutral'}">${p.is_online?'Online':'Offline'}</span></td>
        <td>${new Date(p.created_at).toLocaleDateString()}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteStoreProduct(${storeId},${p.id},'${esc(p.name).replace(/'/g,"\\'")}')">Remove</button></td>
      </tr>`).join('')}
    </tbody></table>`;
  } catch (e) { el.innerHTML = '<p class="error-msg">'+e.message+'</p>'; }
}

async function deleteStoreProduct(storeId, productId, name) {
  if (!confirm('Delete product "'+name+'"? This cannot be undone.')) return;
  try {
    await API.del('/api/stores/'+storeId+'/products/'+productId);
    const row = document.getElementById('sp-'+storeId+'-'+productId);
    if (row) row.remove();
  } catch (e) { alert(e.message); }
}

function showDeactivate(id) {
  document.getElementById('deact-row-'+id).classList.remove('hidden');
}
function hideDeactivate(id) {
  document.getElementById('deact-row-'+id).classList.add('hidden');
}
async function confirmDeactivate(id) {
  const reason = document.getElementById('deact-reason-'+id)?.value;
  if (!reason || reason.trim().length < 3) { alert('Please provide a reason (at least 3 characters)'); return; }
  if (!confirm('Deactivate this store? It will be hidden from the marketplace.')) return;
  try {
    await API.post('/api/stores/'+id+'/deactivate', { reason: reason.trim() });
    await loadStores();
  } catch (e) { alert(e.message); }
}
async function reactivateStore(id) {
  if (!confirm('Reactivate this store?')) return;
  try {
    await API.post('/api/stores/'+id+'/reactivate');
    await loadStores();
  } catch (e) { alert(e.message); }
}

async function saveSponsorPricing(scopeType) {
  try {
    const price = document.getElementById('spp-' + scopeType)?.value;
    const label = document.getElementById('spl-' + scopeType)?.value;
    const unit = document.getElementById('spu-' + scopeType)?.value;
    const updated = await API.request('PUT', '/api/sponsorship/pricing/' + scopeType, {
      price_usd_per_day: price,
      label,
      radius_unit_km: unit != null ? unit : undefined,
    });
    // Reflect the persisted server value back into the input so the admin
    // sees the price actually stuck (previously a silent revert on restart
    // was the symptom — this also catches any future regressions).
    if (updated && updated.price_usd_per_day != null) {
      const priceInput = document.getElementById('spp-' + scopeType);
      if (priceInput) priceInput.value = updated.price_usd_per_day;
    }
    alert('Saved ' + scopeType + ' → $' + (updated?.price_usd_per_day ?? price) + '/day');
  } catch (e) { alert('Save failed: ' + e.message); }
}

async function loadTierOptions() {
  const sel = document.getElementById('pc-tier');
  try {
    const tiers = await API.get('/api/tiers');
    sel.innerHTML = '<option value="">— Select tier —</option>' + tiers.map(t =>
      `<option value="${esc(t.slug)}">${esc(t.name)} (${t.online_slots} slots — $${t.price_usd_monthly}/mo)</option>`
    ).join('');
  } catch (e) {
    sel.innerHTML = '<option value="starter">Starter</option><option value="business">Business</option><option value="pro">Pro</option><option value="enterprise">Enterprise</option>';
  }
}
async function loadPromos() {
  try {
    const items = await API.get('/api/promos');
    const el = document.getElementById('pcl');
    if (items.length === 0) { el.innerHTML = '<div class="empty-state"><p>No promo codes yet</p></div>'; return; }
    el.innerHTML = `<table><thead><tr><th>Code</th><th>Type</th><th>Details</th><th>Account age</th><th>Used / Max</th><th>Remaining</th><th>Expires</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${items.map(p => {
        const remaining = p.max_redemptions ? (p.max_redemptions - p.times_used) : '&infin;';
        const details = p.type === 'tier_grant' ? `${esc(p.tier_slug)} for ${p.grant_days}d` : `${p.discount_percent>0?p.discount_percent+'%':''} ${p.discount_fixed>0?'$'+p.discount_fixed:''}`;
        const ageParts = [];
        if (p.min_account_age_days) ageParts.push('min ' + p.min_account_age_days + 'd');
        if (p.max_account_age_days) ageParts.push('max ' + p.max_account_age_days + 'd');
        const ageRule = ageParts.length ? ageParts.join(', ') : '—';
        return `<tr id="pc-${p.id}"><td><strong>${esc(p.code)}</strong></td><td><span class="badge ${p.type==='tier_grant'?'badge-success':'badge-neutral'}">${p.type==='tier_grant'?'Tier Grant':'Discount'}</span></td><td>${details}</td><td>${ageRule}</td><td>${p.times_used} / ${p.max_redemptions||'&infin;'}</td><td><strong>${remaining}</strong></td><td>${p.expires_at?new Date(p.expires_at).toLocaleDateString():'Never'}</td><td><span class="badge ${p.is_active?'badge-success':'badge-danger'}">${p.is_active?'Active':'Off'}</span></td><td><button class="btn btn-sm ${p.is_active?'btn-warning':'btn-success'}" onclick="togglePromo(${p.id},${!p.is_active})">${p.is_active?'Deactivate':'Activate'}</button> <button class="btn btn-sm btn-danger" onclick="deletePromo(${p.id})">Delete</button></td></tr>`;
      }).join('')}
    </tbody></table>`;
  } catch (e) { document.getElementById('pcl').innerHTML = '<p class="error-msg">'+e.message+'</p>'; }
}
async function createPromo(e) {
  e.preventDefault();
  const err = document.getElementById('pc-err'); err.textContent = '';
  const type = document.getElementById('pc-type').value;
  const payload = {
    code: document.getElementById('pc-code').value,
    type,
    tier_slug: document.getElementById('pc-tier').value || null,
    grant_days: +document.getElementById('pc-days').value || 0,
    discount_percent: +document.getElementById('pc-pct')?.value || 0,
    discount_fixed: +document.getElementById('pc-fix')?.value || 0,
    max_redemptions: document.getElementById('pc-max').value || null,
    expires_at: document.getElementById('pc-exp').value || null,
    min_account_age_days: document.getElementById('pc-min-age').value || null,
    max_account_age_days: document.getElementById('pc-max-age').value || null,
  };
  try {
    await API.post('/api/promos', payload);
    document.getElementById('pf').reset();
    await loadPromos();
  } catch (ex) { err.textContent = ex.message; }
}
async function togglePromo(id, active) { try { await API.patch('/api/promos/'+id, {is_active:active}); await loadPromos(); } catch(e){alert(e.message);} }
async function deletePromo(id) { if(!confirm('Delete?'))return; try { await API.del('/api/promos/'+id); const e=document.getElementById('pc-'+id); if(e)e.remove(); } catch(e){alert(e.message);} }

function formatReason(r) { return {bulk_upload:'Bulk Upload',duplicate_images_cross_account:'Duplicate Images',high_return_rate:'High Returns'}[r]||r; }
function formatDetails(r,d) { if(!d) return ''; if(r==='bulk_upload') return (d.product_count||'50+')+' products in 1 hour'; if(r==='high_return_rate') return d.returned+'/'+d.total+' orders returned'; return 'Cross-account duplicate images detected'; }

async function loadSupportTickets() {
  const el = document.getElementById('support-list');
  if (!el) return;
  const qs = [];
  if (supportStatusFilter && supportStatusFilter !== 'all') {
    qs.push('status=' + encodeURIComponent(supportStatusFilter));
  }
  if (supportCategoryFilter && supportCategoryFilter !== 'all') {
    qs.push('category=' + encodeURIComponent(supportCategoryFilter));
  }
  const url = '/api/support/tickets' + (qs.length ? '?' + qs.join('&') : '');
  try {
    const items = await API.get(url);
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>No support tickets</p></div>';
      return;
    }
    el.innerHTML = items.map(t => `
      <div class="support-item ${activeSupportTicketId === t.id ? 'active' : ''}" onclick="openSupportTicket(${t.id})">
        <div class="title">${esc(t.subject)} ${t.unread_count > 0 ? '<span class="badge badge-warning">'+t.unread_count+'</span>' : ''}</div>
        <div class="meta">${esc(t.user_name)} · ${esc(t.user_email)}</div>
        <div class="meta"><span class="badge ${supportCategoryBadge(t.category)}">${esc(supportCategoryLabel(t.category))}</span> · <span class="badge ${supportStatusBadge(t.status)}">${t.status}</span></div>
        <div class="meta" style="margin-top:4px">${t.last_message ? esc(t.last_message).substring(0,80) : ''}</div>
      </div>`).join('');
  } catch (e) {
    el.innerHTML = '<p class="error-msg">'+e.message+'</p>';
  }
}

function supportStatusBadge(status) {
  if (status === 'closed') return 'badge-neutral';
  if (status === 'in_progress') return 'badge-warning';
  return 'badge-danger';
}

async function openSupportTicket(id) {
  activeSupportTicketId = id;
  await loadSupportTickets();
  await loadSupportThread(id);
  if (supportPollTimer) clearInterval(supportPollTimer);
  supportPollTimer = setInterval(() => {
    if (currentPage === 'support' && activeSupportTicketId) {
      loadSupportThread(activeSupportTicketId, true);
      loadSupportTickets();
    }
  }, 8000);
}

async function loadSupportThread(id, silent) {
  const el = document.getElementById('support-thread');
  if (!el) return;
  if (!silent) {
    el.innerHTML = '<div class="empty-state"><p>Loading conversation...</p></div>';
  }
  try {
    const [data, related] = await Promise.all([
      API.get('/api/support/tickets/'+id+'/messages'),
      API.get('/api/support/tickets/'+id+'/related-payment').catch(() => ({ payment: null })),
    ]);
    const t = data.ticket;
    const msgs = data.messages || [];
    const payment = related.payment || null;
    const hasUserImage = msgs.some(m => m.message_type === 'image' && m.sender_role === 'user');
    const showPaymentAction = hasUserImage && payment && payment.status === 'pending';
    const categoryOptions = Object.entries(SUPPORT_CATEGORIES).map(([k, v]) =>
      `<option value="${k}" ${t.category === k ? 'selected' : ''}>${esc(v)}</option>`
    ).join('');
    el.innerHTML = `
      <div class="support-thread-header">
        <div class="flex justify-between items-center">
          <div>
            <div class="card-title">${esc(t.subject)}</div>
            <div class="card-meta">${esc(t.user_name)} (${esc(t.user_email)}) · <span class="badge ${supportCategoryBadge(t.category)}">${esc(supportCategoryLabel(t.category))}</span> · <span class="badge ${supportStatusBadge(t.status)}">${t.status}</span></div>
            <div class="card-meta" style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <label style="font-size:12px;color:var(--text-muted)">Category</label>
              <select id="support-ticket-category" style="max-width:200px" onchange="setSupportCategory(${id}, this.value)">${categoryOptions}</select>
              <span style="font-size:12px;color:var(--text-muted)">Images allowed: ${t.image_quota || 0} · Sent: ${t.images_sent || 0}</span>
            </div>
          </div>
          <div class="flex gap-2" style="flex-wrap:wrap">
            ${t.status !== 'closed' ? `<button class="btn btn-success btn-sm" onclick="allowSupportImages(${id}, 1)">Allow 1 image</button>` : ''}
            ${t.status !== 'closed' ? `<button class="btn btn-ghost btn-sm" onclick="allowSupportImages(${id}, 3)">Allow 3</button>` : ''}
            ${t.status !== 'closed' ? `<button class="btn btn-warning btn-sm" onclick="setSupportStatus(${id}, 'in_progress')">In Progress</button>` : ''}
            ${t.status !== 'closed' ? `<button class="btn btn-ghost btn-sm" onclick="setSupportStatus(${id}, 'closed')">Close</button>` : `<button class="btn btn-success btn-sm" onclick="setSupportStatus(${id}, 'open')">Reopen</button>`}
            <button class="btn btn-danger btn-sm" onclick="deleteSupportTicket(${id})">Delete</button>
          </div>
        </div>
      </div>
      ${showPaymentAction ? `
        <div class="support-payment-banner">
          <p><strong>Payment proof received.</strong> Reference <code>${esc(payment.reference_code || related.reference_code || '')}</code> · $${payment.amount_usd} · ${payment.type === 'sponsorship' ? 'Sponsorship' : 'Subscription'}${payment.tier_name ? ' · ' + esc(payment.tier_name) : ''}${payment.product_name ? ' · ' + esc(payment.product_name) : ''}</p>
          <button class="btn btn-success btn-sm" onclick="goToPaymentApproval(${payment.id}, '${payment.type}')">Verify payment</button>
        </div>` : ''}
      <div class="support-messages" id="support-messages">
        ${msgs.map(m => `
          <div class="support-bubble ${m.sender_role === 'admin' ? 'admin' : 'user'} ${m.message_type === 'image_request' ? 'image-request' : ''}">
            <div class="who">${esc(m.sender_name || m.sender_role)} · ${new Date(m.created_at).toLocaleString()}</div>
            ${renderSupportMessageBody(m)}
            ${m.message_type === 'image_request' && t.status !== 'closed' && m.request_status !== 'approved' ? `<div style="margin-top:8px"><button class="btn btn-success btn-sm" onclick="allowSupportImages(${id}, 1, this)">Approve 1 image</button></div>` : ''}
          </div>`).join('')}
      </div>
      ${t.status === 'closed'
        ? '<div class="support-compose"><p style="color:var(--text-muted);font-size:13px">Ticket is closed. Reopen to reply.</p></div>'
        : `<div class="support-compose">
            <textarea id="support-reply" placeholder="Type your reply to the user..."></textarea>
            <button class="btn btn-primary" onclick="sendSupportReply(${id})">Send</button>
          </div>`}
    `;
    const box = document.getElementById('support-messages');
    if (box) box.scrollTop = box.scrollHeight;
  } catch (e) {
    el.innerHTML = '<p class="error-msg">'+e.message+'</p>';
  }
}

async function sendSupportReply(id) {
  const input = document.getElementById('support-reply');
  const body = input ? input.value.trim() : '';
  if (!body) return alert('Enter a reply');
  try {
    await API.post('/api/support/tickets/'+id+'/messages', { body });
    if (input) input.value = '';
    await loadSupportThread(id, true);
    await loadSupportTickets();
  } catch (e) { alert(e.message); }
}

async function setSupportStatus(id, status) {
  try {
    await API.patch('/api/support/tickets/'+id, { status });
    await loadSupportThread(id, true);
    await loadSupportTickets();
  } catch (e) { alert(e.message); }
}

async function allowSupportImages(id, count, btn) {
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Approved';
  }
  try {
    await API.post('/api/support/tickets/'+id+'/allow-images', { count });
    await loadSupportThread(id, true);
    await loadSupportTickets();
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Approve 1 image'; }
    alert(e.message);
  }
}

async function setSupportCategory(id, category) {
  try {
    await API.patch('/api/support/tickets/'+id, { category });
    await loadSupportThread(id, true);
    await loadSupportTickets();
  } catch (e) { alert(e.message); }
}

async function allowAllSupportImages() {
  if (!confirm('Approve 1 image upload for every user with a pending image request?')) return;
  try {
    const result = await API.post('/api/support/allow-all-images', { count: 1 });
    alert('Approved ' + (result.users_updated || 0) + ' user(s) across ' + (result.tickets_updated || 0) + ' ticket(s).');

async function deleteSupportTicket(id) {
  if (!confirm('Delete this support ticket and all its messages? This cannot be undone.')) return;

    await API.del('/api/support/tickets/' + id);

function reportMetadata(row) {
  if (!row.metadata) return {};
  if (typeof row.metadata === 'string') {
    try { return JSON.parse(row.metadata); } catch (_) { return {}; }
  }
  return row.metadata;
}
function reportTargetLabel(row) {
  const meta = reportMetadata(row);
  if (row.target_type === 'store') return row.store_name || meta.store_name || ('Store #' + row.target_id);
  if (row.target_type === 'product') return row.product_name || meta.product_name || ('Product #' + row.target_id);
  if (row.target_type === 'chat') {
    const store = row.chat_store_name || meta.store_name || '';
    const customer = row.chat_customer_name || meta.customer_name || '';
    return 'Chat #' + row.target_id + (store ? ' · ' + store : '') + (customer ? ' · ' + customer : '');
  }
  return '#' + row.target_id;
}

async function loadReports() {
  const el = document.getElementById('reports-table-wrap');
  if (!el) return;
  let url = '/api/reports?status=' + encodeURIComponent(reportsFilterStatus);
  if (reportsFilterType) url += '&type=' + encodeURIComponent(reportsFilterType);
  try {
    const items = await API.get(url);
    if (!items.length) {

      return;
    }
    el.innerHTML = `<table><thead><tr>
      <th>Type</th><th>Target</th><th>Reason</th><th>Reporter</th><th>Status</th><th>Created</th><th>Actions</th>

      <tr id="report-row-${r.id}">
        <td><span class="badge badge-neutral">${esc(r.target_type)}</span></td>
        <td>${esc(reportTargetLabel(r))}</td>
        <td style="max-width:280px;white-space:normal;font-size:13px">${esc(r.reason)}</td>
        <td>${esc(r.reporter_name || (r.reporter_role === 'user' ? 'User' : 'Reporter'))}<br><span class="card-meta">${esc(r.reporter_email || '')}</span></td>
        <td><span class="badge ${r.status === 'open' ? 'badge-warning' : r.status === 'resolved' ? 'badge-success' : 'badge-neutral'}">${esc(r.status)}</span></td>
        <td>${new Date(r.created_at).toLocaleString()}</td>
        <td>${r.status === 'open'
          ? `<button class="btn btn-success btn-sm" onclick="resolveReport(${r.id}, 'resolved')">Resolve</button>
             <button class="btn btn-ghost btn-sm" onclick="resolveReport(${r.id}, 'dismissed')">Dismiss</button>`
          : '<span style="color:var(--text-muted);font-size:12px">—</span>'}
        </td>
      </tr>`).join('')}</tbody></table>`;
  } catch (e) {
    el.innerHTML = '<p class="error-msg">' + e.message + '</p>';
  }
}

async function resolveReport(id, status) {
  const note = status === 'resolved' ? prompt('Resolution note (optional):') : null;
  try {
    await API.patch('/api/reports/' + id, { status, resolution_note: note || undefined });
    await loadReports();
  } catch (e) { alert(e.message); }
}

function goToPaymentApproval(paymentId, type) {
  paymentHighlightId = paymentId;
  paymentHighlightType = type;
  navigateTo(type === 'sponsorship' ? 'sponsored' : 'payments');
}

function highlightPaymentRow(rowId) {
  const row = document.getElementById(rowId);
  if (!row) return;
  row.style.background = 'rgba(16, 185, 129, 0.18)';
  row.style.outline = '2px solid rgba(16, 185, 129, 0.45)';
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => {
    row.style.background = '';
    row.style.outline = '';
  }, 6000);
}

// ─── Users ───────────────────────────────────────────────────────────────────
let usersTypeFilter = 'all';
async function renderUsers(c) {
  c.innerHTML = `
    <div class="page-header flex justify-between items-center">
      <div><h2>Users</h2><p>Consumers, store owners, and workers</p></div>
      <div class="inline-form">
        <div class="form-group"><label>Type</label>
          <select id="users-type-filter" style="width:180px">
            <option value="all">All</option>
            <option value="consumer">Consumers</option>
            <option value="store_owner">Store Owners</option>
            <option value="worker">Workers</option>
            <option value="admin">Admins</option>
          </select>
        </div>
        <div class="form-group"><label>Search</label>
          <input type="text" id="users-search" placeholder="Name, email, phone" style="width:200px">
        </div>
        <button class="btn btn-ghost" id="users-refresh-btn">Refresh</button>
      </div>
    </div>
    <div class="card"><div id="users-table">Loading...</div></div>`;
  document.getElementById('users-type-filter').value = usersTypeFilter;
  document.getElementById('users-type-filter').addEventListener('change', (e) => {
    usersTypeFilter = e.target.value;
    loadUsers();
  });
  document.getElementById('users-refresh-btn').addEventListener('click', () => loadUsers());
  document.getElementById('users-search').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadUsers();
  });
  await loadUsers();
}

function userTypeBadge(type) {
  const map = {
    consumer: 'badge-neutral',
    store_owner: 'badge-success',
    worker: 'badge-warning',
    admin: 'badge-danger',
  };
  return map[type] || 'badge-neutral';
}

function formatUserStores(u) {
  if (u.user_type === 'store_owner' && u.owned_store_name) {
    return esc(u.owned_store_name) + ' (#' + u.owned_store_id + ')';
  }
  if (u.user_type === 'worker' && u.worker_stores && u.worker_stores.length) {
    return u.worker_stores.map(w => esc(w.store_name) + ' (#' + w.store_id + ')').join(', ');
  }
  return '—';
}

async function loadUsers() {
  const el = document.getElementById('users-table');
  if (!el) return;
  const search = document.getElementById('users-search')?.value?.trim() || '';
  let url = '/api/users?type=' + encodeURIComponent(usersTypeFilter);
  if (search) url += '&search=' + encodeURIComponent(search);
  try {
    const items = await API.get(url);
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><p>No users found</p></div>';
      return;
    }
    el.innerHTML = `<table><thead><tr>
      <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Type</th><th>Store(s)</th><th>Joined</th>
    </tr></thead><tbody>
      ${items.map(u => `<tr>
        <td>${u.id}</td>
        <td>${esc(u.full_name)}</td>
        <td>${esc(u.email)}</td>
        <td>${esc(u.phone || '—')}</td>
        <td><span class="badge ${userTypeBadge(u.user_type)}">${esc(u.user_type)}</span></td>
        <td>${formatUserStores(u)}</td>
        <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</td>
      </tr>`).join('')}
    </tbody></table>`;
  } catch (e) {
    el.innerHTML = '<p class="error-msg">' + e.message + '</p>';
  }
}

// ─── Reviews ─────────────────────────────────────────────────────────────────
let reviewsStatusFilter = 'active';
let reviewsTypeFilter = 'all';
async function renderReviews(c) {
  c.innerHTML = `
    <div class="page-header flex justify-between items-center">
      <div><h2>Reviews</h2><p>Only admins can remove reviews. Store owners must use support tickets.</p></div>
      <div class="inline-form">
        <div class="form-group"><label>Type</label>
          <select id="reviews-type-filter" style="width:130px">
            <option value="all">All</option>
            <option value="store">Store</option>
            <option value="product">Product</option>
          </select>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="reviews-status-filter" style="width:140px">
            <option value="active">Active</option>
            <option value="removed">Removed</option>
            <option value="all">All</option>
          </select>
        </div>
        <button class="btn btn-ghost" id="reviews-refresh-btn">Refresh</button>
      </div>
    </div>
    <div class="card"><div id="reviews-table">Loading...</div></div>`;
  document.getElementById('reviews-type-filter').value = reviewsTypeFilter;
  document.getElementById('reviews-status-filter').value = reviewsStatusFilter;
  document.getElementById('reviews-type-filter').addEventListener('change', (e) => {
    reviewsTypeFilter = e.target.value;
    loadReviews();
  });
  document.getElementById('reviews-status-filter').addEventListener('change', (e) => {
    reviewsStatusFilter = e.target.value;
    loadReviews();
  });
  document.getElementById('reviews-refresh-btn').addEventListener('click', () => loadReviews());
  await loadReviews();
}

function starsHtml(rating) {
  const r = Math.max(1, Math.min(5, Number(rating) || 0));
  return '★'.repeat(r) + '☆'.repeat(5 - r);
}

async function loadReviews() {
  const el = document.getElementById('reviews-table');
  if (!el) return;
  try {
    const items = await API.get('/api/reviews?status=' + encodeURIComponent(reviewsStatusFilter) + '&type=' + encodeURIComponent(reviewsTypeFilter));
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><p>No reviews</p></div>';
      return;
    }
    el.innerHTML = `<table><thead><tr>
      <th>Type</th><th>Target</th><th>User</th><th>Rating</th><th>Comment</th><th>Date</th><th>Status</th><th>Action</th>
    </tr></thead><tbody>
      ${items.map(r => `<tr>
        <td><span class="badge ${r.review_type === 'product' ? 'badge-warning' : 'badge-success'}">${esc(r.review_type)}</span></td>
        <td>${r.review_type === 'product'
          ? esc(r.product_name || r.target_name) + ' · ' + esc(r.store_name || '')
          : esc(r.store_name || r.target_name)}</td>
        <td>${esc(r.user_name)}<br><span class="card-meta">${esc(r.user_email)}</span></td>
        <td>${starsHtml(r.rating)}</td>
        <td style="max-width:280px">${esc((r.comment || '—').substring(0, 200))}</td>
        <td>${r.created_at ? new Date(r.created_at).toLocaleString() : '—'}</td>
        <td><span class="badge ${r.status === 'active' ? 'badge-success' : 'badge-neutral'}">${esc(r.status)}</span></td>
        <td>${r.status === 'active'
          ? `<button class="btn btn-danger btn-sm" onclick="removeReview(${r.id}, '${r.review_type}')">Remove</button>`
          : (r.removal_reason ? esc(r.removal_reason).substring(0, 60) : '—')}</td>
      </tr>`).join('')}
    </tbody></table>`;
  } catch (e) {
    el.innerHTML = '<p class="error-msg">' + e.message + '</p>';
  }
}

async function removeReview(id, type) {
  const reason = prompt('Enter removal reason (min 10 chars — emailed to the user):');
  if (!reason) return;
  if (reason.trim().length < 10) {
    alert('Reason must be at least 10 characters');
    return;
  }
  if (!confirm('Remove this ' + (type || 'store') + ' review and email the user?')) return;
  try {
    await API.post('/api/reviews/' + id + '/remove', { reason: reason.trim(), type: type || 'store' });
    await loadReviews();
    alert('Review removed and email sent');
  } catch (e) {
    alert(e.message);
  }
}

// ─── Init ────────────────────────────────────────────────────────────────────
(async () => {
  try {
    await API.get('/api/auth/me');
    hideLogin();
    await loadMediaConfig();
    navigateTo('analytics');
  } catch (err) {
    console.log('Auth check:', err.message);
    showLogin();
    // Show helpful message if it's a connection issue
    if (err.message.includes('Cannot reach') || err.message.includes('file:')) {
      document.getElementById('login-error').textContent = err.message;
    }
  }
})();
</script>
